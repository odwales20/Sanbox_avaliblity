<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Sandbox Café — Vehicle Availability</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #16110a;
    font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
  }

  #app {
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  #header {
    flex-shrink: 0;
    height: 20vh;
    padding: 0 3.5vw;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #16110a;
    border-bottom: 2px solid #2a2010;
  }

  #logo {
    height: clamp(28px, 5.5vh, 72px);
    display: block;
    margin-bottom: 1.2vh;
  }

  #venue-name {
    font-size: clamp(10px, 1.4vh, 18px);
    color: #7a6840;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 1.2vh;
    display: none;
  }

  #session-row {
    display: flex;
    align-items: center;
    gap: 2vw;
  }

  #session-badge {
    font-size: clamp(10px, 1.5vh, 20px);
    font-weight: 600;
    padding: clamp(3px, 0.6vh, 10px) clamp(10px, 1.4vw, 22px);
    border-radius: 99px;
    white-space: nowrap;
  }
  #session-badge.cur  { background: #1e3010; color: #78d060; }
  #session-badge.nxt  { background: #2e1a04; color: #e8a030; }
  #session-badge.done { background: #221a0c; color: #7a6840; }

  #session-time {
    font-size: clamp(30px, 8vh, 110px);
    font-weight: 700;
    color: #f0d898;
    line-height: 1;
    letter-spacing: -0.02em;
  }

  #clock {
    font-size: clamp(40px, 9vh, 120px);
    font-weight: 300;
    color: #f0d898;
    font-family: 'Courier New', 'Lucida Console', monospace;
    letter-spacing: 0.04em;
    line-height: 1;
  }

  /* ── PARKING LOT ── */
  #lot {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #1c1610;
    padding: 2.2vh 3.5vw 2.5vh;
    min-height: 0;
  }

  .vehicle-row {
    flex: 1;
    display: flex;
    align-items: stretch;
    min-height: 0;
    border-top: 3px solid #c8a848;
    border-bottom: 3px solid #c8a848;
  }

  .lane-gap {
    flex-shrink: 0;
    height: 2.2vh;
    display: flex;
    align-items: center;
  }
  .lane-gap::before {
    content: '';
    display: block;
    width: 100%;
    border-top: 2px dashed #2e2418;
  }

  .row-label {
    width: 13vw;
    min-width: 90px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding-right: 2vw;
  }

  .row-label-name {
    font-size: clamp(11px, 1.8vh, 26px);
    font-weight: 600;
    color: #c8a848;
    line-height: 1.25;
  }

  .bays {
    flex: 1;
    display: flex;
    min-width: 0;
  }

  .bay {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    border-right: 2.5px solid #c8a848;
    min-width: 0;
  }
  .bay:last-child { border-right: none; }

  .bay-occupied { background: #221c12; }
  .bay-empty    { background: #1c1610; }

  .bay-vehicle {
    width: 52%;
    height: 78%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .bay-vehicle svg { width: 100%; height: 100%; }

  .bay-empty-marker {
    width: 38%;
    height: 62%;
    border: 1.5px dashed #2e2418;
    border-radius: 4px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 6%;
  }
  .bay-number {
    font-size: clamp(8px, 1.1vh, 15px);
    color: #3a2e18;
    font-weight: 600;
    letter-spacing: 0.05em;
  }

  #no-sessions {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #no-sessions p {
    font-size: clamp(16px, 2.5vh, 36px);
    color: #5a4830;
  }
</style>
</head>
<body>

<div id="app">

  <div id="header">
    <div>
      <img id="logo"
        src="https://thesandboxcafekeswick.co.uk/wp-content/uploads/2025/06/base_logo_transparent_background-scaled.png"
        alt="The Sandbox Café"
        onerror="this.style.display='none'; document.getElementById('venue-name').style.display='block';"
      />
      <div id="venue-name">The Sandbox Café &middot; Keswick</div>
      <div id="session-row">
        <span id="session-badge" class="cur">Current session</span>
        <span id="session-time">&mdash;</span>
      </div>
    </div>
    <span id="clock">&mdash;</span>
  </div>

  <div id="lot"></div>

</div>

<script>
  /* ── DEMO DATA — replace with Bookwhen API fetch ── */
  const SESSIONS = [
    { hour:11, label:'11am', digger:{booked:1,total:3}, loader:{booked:3,total:3}, tipper:{booked:2,total:3} },
    { hour:12, label:'12pm', digger:{booked:3,total:3}, loader:{booked:0,total:3}, tipper:{booked:1,total:3} },
    { hour:13, label:'1pm',  digger:{booked:2,total:3}, loader:{booked:1,total:3}, tipper:{booked:3,total:3} },
    { hour:14, label:'2pm',  digger:{booked:1,total:3}, loader:{booked:2,total:3}, tipper:{booked:0,total:3} },
    { hour:15, label:'3pm',  digger:{booked:0,total:3}, loader:{booked:1,total:3}, tipper:{booked:2,total:3} },
    { hour:16, label:'4pm',  digger:{booked:2,total:3}, loader:{booked:0,total:3}, tipper:{booked:1,total:3} },
  ];

  const VEHICLES = [
    { key:'digger', label:'Digger hire',         color:'#f5c518', dark:'#b8900a', svg: diggerSVG },
    { key:'loader', label:'Loading shovel hire',  color:'#f07210', dark:'#a84e08', svg: loaderSVG },
    { key:'tipper', label:'Tipper lorry hire',   color:'#d43010', dark:'#8c1a08', svg: tipperSVG },
  ];

  function diggerSVG(c, d) {
    return `<svg viewBox="0 0 56 90" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
      <rect x="1" y="9" width="9" height="72" rx="4" fill="${c}" stroke="${d}" stroke-width="0.5"/>
      <rect x="46" y="9" width="9" height="72" rx="4" fill="${c}" stroke="${d}" stroke-width="0.5"/>
      <line x1="1"  y1="19" x2="10" y2="19" stroke="${d}" stroke-width="1"/>
      <line x1="1"  y1="29" x2="10" y2="29" stroke="${d}" stroke-width="1"/>
      <line x1="1"  y1="39" x2="10" y2="39" stroke="${d}" stroke-width="1"/>
      <line x1="1"  y1="49" x2="10" y2="49" stroke="${d}" stroke-width="1"/>
      <line x1="1"  y1="59" x2="10" y2="59" stroke="${d}" stroke-width="1"/>
      <line x1="1"  y1="69" x2="10" y2="69" stroke="${d}" stroke-width="1"/>
      <line x1="46" y1="19" x2="55" y2="19" stroke="${d}" stroke-width="1"/>
      <line x1="46" y1="29" x2="55" y2="29" stroke="${d}" stroke-width="1"/>
      <line x1="46" y1="39" x2="55" y2="39" stroke="${d}" stroke-width="1"/>
      <line x1="46" y1="49" x2="55" y2="49" stroke="${d}" stroke-width="1"/>
      <line x1="46" y1="59" x2="55" y2="59" stroke="${d}" stroke-width="1"/>
      <line x1="46" y1="69" x2="55" y2="69" stroke="${d}" stroke-width="1"/>
      <rect x="11" y="15" width="34" height="60" rx="3" fill="${c}" stroke="${d}" stroke-width="0.5"/>
      <rect x="11" y="61" width="34" height="12" rx="2" fill="${d}"/>
      <rect x="13" y="17" width="30" height="36" rx="2" fill="${d}" opacity="0.65"/>
      <rect x="15" y="19" width="20" height="20" rx="2" fill="${d}"/>
      <rect x="17" y="21" width="16" height="13" rx="1" fill="#06090f" opacity="0.92"/>
      <rect x="24" y="11" width="8"  height="6"  rx="1" fill="${d}"/>
      <rect x="25" y="3"  width="6"  height="10" rx="2" fill="${c}" stroke="${d}" stroke-width="0.5"/>
      <path d="M23 2 L33 2 L34 6 L22 6 Z" fill="${d}"/>
    </svg>`;
  }

  function loaderSVG(c, d) {
    return `<svg viewBox="0 0 56 90" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
      <rect x="2"  y="9"  width="13" height="13" rx="6" fill="${d}"/>
      <rect x="41" y="9"  width="13" height="13" rx="6" fill="${d}"/>
      <rect x="2"  y="68" width="13" height="13" rx="6" fill="${d}"/>
      <rect x="41" y="68" width="13" height="13" rx="6" fill="${d}"/>
      <rect x="10" y="20" width="36" height="50" rx="3" fill="${c}" stroke="${d}" stroke-width="0.5"/>
      <rect x="13" y="24" width="30" height="26" rx="2" fill="${d}" opacity="0.65"/>
      <rect x="15" y="26" width="26" height="18" rx="2" fill="${d}"/>
      <rect x="18" y="28" width="20" height="12" rx="1" fill="#06090f" opacity="0.92"/>
      <rect x="5"  y="2"  width="46" height="20" rx="3" fill="${c}" stroke="${d}" stroke-width="0.5"/>
      <rect x="5"  y="2"  width="46" height="9"  rx="2" fill="${d}"/>
    </svg>`;
  }

  function tipperSVG(c, d) {
    return `<svg viewBox="0 0 56 90" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
      <rect x="2"  y="5"  width="12" height="12" rx="5" fill="${d}"/>
      <rect x="42" y="5"  width="12" height="12" rx="5" fill="${d}"/>
      <rect x="2"  y="43" width="12" height="12" rx="5" fill="${d}"/>
      <rect x="42" y="43" width="12" height="12" rx="5" fill="${d}"/>
      <rect x="2"  y="59" width="12" height="12" rx="5" fill="${d}"/>
      <rect x="42" y="59" width="12" height="12" rx="5" fill="${d}"/>
      <rect x="8"  y="1"  width="40" height="22" rx="3" fill="${c}" stroke="${d}" stroke-width="0.5"/>
      <rect x="11" y="4"  width="34" height="14" rx="2" fill="${d}"/>
      <rect x="14" y="6"  width="28" height="9"  rx="1" fill="#06090f" opacity="0.92"/>
      <rect x="5"  y="21" width="46" height="63" rx="3" fill="${c}" stroke="${d}" stroke-width="0.5"/>
      <rect x="5"  y="21" width="46" height="7"  rx="1" fill="${d}"/>
      <line x1="5" y1="50" x2="51" y2="50" stroke="${d}" stroke-width="2"/>
      <line x1="5" y1="66" x2="51" y2="66" stroke="${d}" stroke-width="1"/>
      <line x1="5" y1="78" x2="51" y2="78" stroke="${d}" stroke-width="0.5"/>
    </svg>`;
  }

  function getActiveSession(now) {
    const h = now.getHours(), m = now.getMinutes();
    for (const s of SESSIONS)
      if (h === s.hour && m <= 10) return { session: s, isCurrent: true };
    for (const s of SESSIONS)
      if (h * 60 + m < s.hour * 60) return { session: s, isCurrent: false };
    return null;
  }

  function pad(n) { return String(n).padStart(2, '0'); }

  function render() {
    const now    = new Date();
    const active = getActiveSession(now);

    document.getElementById('clock').textContent =
      pad(now.getHours()) + ':' + pad(now.getMinutes());

    const badge  = document.getElementById('session-badge');
    const timeEl = document.getElementById('session-time');
    const lot    = document.getElementById('lot');

    if (!active) {
      badge.className   = 'done';
      badge.textContent = 'No more sessions today';
      timeEl.textContent = '';
      lot.innerHTML = `<div id="no-sessions"><p>Sessions have finished for today</p></div>`;
      return;
    }

    badge.className   = active.isCurrent ? 'cur' : 'nxt';
    badge.textContent = active.isCurrent ? 'Current session' : 'Next session';
    timeEl.textContent = active.session.label;

    let html = '';
    VEHICLES.forEach((v, vi) => {
      const data = active.session[v.key];
      if (vi > 0) html += `<div class="lane-gap"></div>`;
      html += `<div class="vehicle-row">`;
      html += `<div class="row-label"><span class="row-label-name">${v.label}</span></div>`;
      html += `<div class="bays">`;
      for (let b = 0; b < data.total; b++) {
        const occupied = b < data.booked;
        html += `<div class="bay ${occupied ? 'bay-occupied' : 'bay-empty'}">`;
        if (occupied) {
          html += `<div class="bay-vehicle">${v.svg(v.color, v.dark)}</div>`;
        } else {
          html += `<div class="bay-empty-marker"><span class="bay-number">${v.key.charAt(0).toUpperCase()}${b + 1}</span></div>`;
        }
        html += `</div>`;
      }
      html += `</div></div>`;
    });
    lot.innerHTML = html;
  }

  render();
  setInterval(render, 30000);
</script>
</body>
</html>
